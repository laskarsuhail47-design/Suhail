<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">

<title>Eid Mubarak</title>

<style>

/* FORCE BLACK SKY */
html,body{
margin:0;
padding:0;
background:#000 !important;
overflow:hidden;
color:white;
text-align:center;
font-family:Arial;
}

/* credit */

.credit{
position:fixed;
top:5px;
width:100%;
font-size:12px;
opacity:0.7;
z-index:10;
}

/* stars */

.star{
position:absolute;
width:2px;
height:2px;
background:white;
animation:move linear infinite;
z-index:1;
}

@keyframes move{
0%{transform:translateY(0);}
100%{transform:translateY(100vh);}
}

/* moon */

.moon{
position:absolute;
top:60px;
left:50%;
transform:translateX(-50%);
width:120px;
height:120px;
background:white;
border-radius:50%;
box-shadow:0 0 40px white,0 0 100px gold;
z-index:3;
}

.moon:after{
content:"";
position:absolute;
top:0;
left:40px;
width:120px;
height:120px;
background:black;
border-radius:50%;
}

/* mosque */

.mosque{
position:absolute;
bottom:0;
width:100%;
height:180px;
background:black;
clip-path:polygon(
0% 100%, 
0% 60%, 
10% 60%, 
15% 40%, 
20% 60%, 
30% 60%, 
35% 30%, 
40% 60%, 
50% 60%, 
55% 40%, 
60% 60%, 
70% 60%, 
75% 30%, 
80% 60%, 
90% 60%, 
100% 60%, 
100% 100%
);
box-shadow:0 -10px 40px rgba(255,215,0,0.3);
z-index:2;
}

/* text */

.eid{
position:absolute;
top:-100px;
width:100%;
font-size:55px;
font-family:'Cinzel', serif;
color:gold;
text-shadow:0 0 20px gold,0 0 60px gold;
animation:drop 3s forwards;
z-index:4;
}

@keyframes drop{
to{top:40%;}
}

/* firecracker particles */

.particle{
position:absolute;
width:4px;
height:4px;
background:gold;
border-radius:50%;
pointer-events:none;
animation:explode 1s ease-out forwards;
z-index:5;
}

@keyframes explode{
from{
transform:translate(0,0);
opacity:1;
}
to{
transform:translate(var(--x), var(--y));
opacity:0;
}
}

/* button */

button{
display:none;
position:absolute;
top:65%;
left:50%;
transform:translateX(-50%);
padding:12px 25px;
font-size:18px;
border:none;
border-radius:25px;
background:gold;
cursor:pointer;
z-index:6;
}

/* note */

.note{
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
color:black;
padding:25px;
border-radius:20px;
max-width:320px;
z-index:7;
}

</style>
</head>

<body>

<div class="credit">WEBSITE DEVELOPER: SUHAIL</div>

<div class="moon"></div>
<div class="mosque"></div>

<div class="eid">EID MUBARAK ✨</div>

<button id="btn" onclick="showNote()">Show Note</button>

<div class="note" id="note">
<p>
Assalamualaikum,  
Wishing all my friends a very happy and blessed Eid Mubarak.  
May Allah fill your life with happiness, peace and success.  

✨ Eid Mubarak ✨  

<br><br>
<b>From Suhail</b>
</p>
</div>

<script>

/* stars */

for(let i=0;i<120;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
s.style.animationDuration=(5+Math.random()*10)+"s";
document.body.appendChild(s);
}

/* REAL FIREWORKS */

function firework(x,y){

for(let i=0;i<25;i++){

let p=document.createElement("div");
p.className="particle";

let angle=Math.random()*2*Math.PI;
let radius=100+Math.random()*50;

p.style.setProperty('--x', Math.cos(angle)*radius+'px');
p.style.setProperty('--y', Math.sin(angle)*radius+'px');

p.style.left=x+"px";
p.style.top=y+"px";

document.body.appendChild(p);

setTimeout(()=>p.remove(),1000);

}
}

/* trigger fireworks after text drop */

setTimeout(()=>{
firework(window.innerWidth*0.2, window.innerHeight*0.4);
firework(window.innerWidth*0.8, window.innerHeight*0.4);
},3000);

/* show button after 5 sec */

setTimeout(()=>{
document.getElementById("btn").style.display="block";
},5000);

/* show note */

function showNote(){
document.getElementById("note").style.display="block";
}

</script>

</body>
</html>
