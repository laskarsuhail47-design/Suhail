<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Afrin ❤️</title>

<style>

body{
margin:0;
padding:0;
background:black;
color:white;
font-family:cursive;
text-align:center;
overflow:hidden;
}

/* Rain */
.rain{
position:fixed;
width:100%;
height:100%;
background:url("https://i.imgur.com/NM7b6Rk.png");
animation:rain 0.5s linear infinite;
opacity:0.3;
}

@keyframes rain{
0%{background-position:0 0;}
100%{background-position:-100px 500px;}
}

/* Envelope */

.envelope{
font-size:100px;
margin-top:150px;
cursor:pointer;
animation:float 2s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-20px)}
100%{transform:translateY(0)}
}

/* Afrin Name */

.name{
font-size:60px;
color:#ff4da6;
text-shadow:0 0 20px pink,0 0 40px pink;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px pink}
to{text-shadow:0 0 40px hotpink}
}

.note{
font-size:20px;
margin:20px;
}

button{
padding:12px 25px;
border:none;
border-radius:30px;
font-size:16px;
cursor:pointer;
margin:10px;
}

.play{
background:#ff4d6d;
color:white;
}

.whatsapp{
background:#25D366;
color:white;
}

</style>
</head>

<body>

<div class="rain"></div>

<div id="start">

<div class="envelope" onclick="openLetter()">✉️</div>
<p>Click the envelope</p>

</div>

<div id="content" style="display:none">

<h1 class="name">Afrin ❤️</h1>

<p class="note">
From the moment I met you,  
my world became brighter.  
No matter what happens,  
my heart will always choose you.
</p>

<button class="play" onclick="playSong()">🎵 Play Our Song</button>

<br>

<a href="https://wa.me/918822873317?text=Hi%20I%20love%20you">
<button class="whatsapp">💬 If you love me text me on WhatsApp</button>
</a>

</div>

<audio id="song">
<source src="https://www2.cs.uic.edu/~i101/SoundFiles/StarWars60.wav" type="audio/mpeg">
</audio>

<script>

function openLetter(){

document.getElementById("start").style.display="none";
document.getElementById("content").style.display="block";

emojiBlast()

}

function playSong(){
document.getElementById("song").play()
}

function emojiBlast(){

for(let i=0;i<1000;i++){

let heart=document.createElement("div")

heart.innerHTML="💖"

heart.style.position="fixed"
heart.style.left=Math.random()*100+"%"
heart.style.top=Math.random()*100+"%"
heart.style.fontSize=(Math.random()*30)+"px"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),3000)

}

}

</script>

</body>
</html>
