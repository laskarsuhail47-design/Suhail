<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Mubarak</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#0f2027,#203a43,#2c5364);
overflow:hidden;
color:white;
text-align:center;
}

/* top credit */

.credit{
position:fixed;
top:5px;
width:100%;
font-size:12px;
opacity:0.7;
}

/* moon */

.moon{
position:absolute;
top:50px;
left:50%;
transform:translateX(-50%);
width:100px;
height:100px;
background:white;
border-radius:50%;
box-shadow:0 0 40px white,0 0 80px gold;
}

.moon:after{
content:"";
position:absolute;
top:0;
left:30px;
width:100px;
height:100px;
background:#203a43;
border-radius:50%;
}

/* falling stars */

.star{
position:fixed;
font-size:12px;
color:white;
top:-10px;
animation:fall linear infinite;
opacity:0.8;
}

@keyframes fall{
to{
transform:translateY(110vh);
}
}

/* eid text */

.eid{
position:absolute;
top:-100px;
width:100%;
font-size:40px;
color:gold;
text-shadow:0 0 20px gold,0 0 40px gold;
animation:drop 3s forwards;
}

@keyframes drop{
to{
top:40%;
}
}

/* edge stars glow */

.edge-star{
position:fixed;
font-size:20px;
color:gold;
opacity:0;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{opacity:0.2;}
to{opacity:1;}
}

/* button */

button{
display:none;
position:absolute;
top:60%;
left:50%;
transform:translateX(-50%);
padding:12px 25px;
font-size:18px;
border:none;
border-radius:25px;
background:gold;
cursor:pointer;
}

/* note */

.note{
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
color:black;
padding:20px;
border-radius:15px;
max-width:300px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

</style>
</head>

<body>

<div class="credit">WEBSITE DEVELOPER: SUHAIL</div>

<div class="moon"></div>

<div class="eid">EID MUBARAK ✨</div>

<button id="btn" onclick="showNote()">Show Note</button>

<div class="note" id="note">

<p>
Assalamualaikum,  
Wishing you and all my friends a very happy and blessed Eid Mubarak.  
May Allah fill your life with happiness, peace, and success.  
Enjoy this beautiful day with your loved ones.  

✨ Eid Mubarak to everyone ✨  

<br><br>
<b>From Suhail</b>
</p>

</div>

<script>

/* falling stars */

for(let i=0;i<40;i++){
let s=document.createElement("div");
s.className="star";
s.innerHTML="✦";
s.style.left=Math.random()*100+"vw";
s.style.animationDuration=(2+Math.random()*3)+"s";
document.body.appendChild(s);
}

/* edge glowing stars */

setTimeout(()=>{
let positions = [
"top:10px;left:10px;",
"top:10px;right:10px;",
"bottom:10px;left:10px;",
"bottom:10px;right:10px;"
];

positions.forEach(pos=>{
let e=document.createElement("div");
e.className="edge-star";
e.style.cssText += pos;
e.innerHTML="✨";
e.style.opacity="1";
document.body.appendChild(e);
});
},3000);

/* show button after 5 sec */

setTimeout(()=>{
document.getElementById("btn").style.display="block";
},5000);

/* show note */

function showNote(){
document.getElementById("note").style.display="block";
}

</script>

</body>
</html>
