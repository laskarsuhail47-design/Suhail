<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Beautiful Font -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<title>Eid Mubarak</title>

<style>

body{
margin:0;
overflow:hidden;
background:radial-gradient(circle at bottom,#020111 0%,#000000 100%);
color:white;
text-align:center;
font-family:Arial;
}

/* credit */

.credit{
position:fixed;
top:5px;
width:100%;
font-size:12px;
opacity:0.6;
}

/* moving stars background */

.star{
position:absolute;
width:2px;
height:2px;
background:white;
animation:moveStars linear infinite;
}

@keyframes moveStars{
from{transform:translateY(0);}
to{transform:translateY(100vh);}
}

/* moon */

.moon{
position:absolute;
top:60px;
left:50%;
transform:translateX(-50%);
width:120px;
height:120px;
background:white;
border-radius:50%;
box-shadow:0 0 40px white,0 0 80px gold;
}

.moon:after{
content:"";
position:absolute;
top:0;
left:40px;
width:120px;
height:120px;
background:black;
border-radius:50%;
}

/* Eid text */

.eid{
position:absolute;
top:-100px;
width:100%;
font-size:50px;
font-family:'Great Vibes', cursive;
color:gold;
text-shadow:0 0 20px gold,0 0 50px gold;
animation:drop 3s forwards;
}

@keyframes drop{
to{
top:40%;
}
}

/* fireworks */

.fire{
position:absolute;
font-size:30px;
opacity:0;
animation:blast 1s ease-out forwards;
}

@keyframes blast{
0%{transform:scale(0); opacity:1;}
100%{transform:scale(3); opacity:0;}
}

/* button */

button{
display:none;
position:absolute;
top:65%;
left:50%;
transform:translateX(-50%);
padding:12px 25px;
font-size:18px;
border:none;
border-radius:25px;
background:gold;
cursor:pointer;
}

/* note */

.note{
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
color:black;
padding:25px;
border-radius:20px;
max-width:320px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

</style>
</head>

<body>

<div class="credit">WEBSITE DEVELOPER: SUHAIL</div>

<div class="moon"></div>

<div class="eid" id="eidText">Eid Mubarak ✨</div>

<button id="btn" onclick="showNote()">Show Note</button>

<div class="note" id="note">
<p>
Assalamualaikum,  
Wishing all my friends a very happy and blessed Eid Mubarak.  
May Allah fill your life with happiness, peace and success.  
Enjoy this beautiful day with your loved ones.  

✨ Eid Mubarak ✨  

<br><br>
<b>From Suhail</b>
</p>
</div>

<script>

/* moving stars */

for(let i=0;i<100;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
s.style.animationDuration=(5+Math.random()*10)+"s";
document.body.appendChild(s);
}

/* fireworks after text stops */

setTimeout(()=>{

for(let i=0;i<15;i++){

let leftFire=document.createElement("div");
leftFire.className="fire";
leftFire.innerHTML="✨";
leftFire.style.left="20%";
leftFire.style.top="40%";
document.body.appendChild(leftFire);

let rightFire=document.createElement("div");
rightFire.className="fire";
rightFire.innerHTML="✨";
rightFire.style.right="20%";
rightFire.style.top="40%";
document.body.appendChild(rightFire);

}

},3000);

/* show button after 5 sec */

setTimeout(()=>{
document.getElementById("btn").style.display="block";
},5000);

/* show note */

function showNote(){
document.getElementById("note").style.display="block";
}

</script>

</body>
</html>
